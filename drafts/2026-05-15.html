<title>Weekly Briefing Draft — 2026-05-15</title>
<style>
:root {--bg:#f8f9fa;--card:#fff;--text:#1a1a2e;--text-muted:#6b7280;--border:#e5e7eb;--primary:#1a73e8;--success:#16a34a;--warning:#d97706;--info:#2563eb;--destructive:#dc2626}
@media(prefers-color-scheme:dark){:root{--bg:#111118;--card:#1c1c27;--text:#e4e4e7;--text-muted:#9ca3af;--border:#2e2e3a;--primary:#60a5fa;--success:#4ade80;--warning:#fbbf24;--info:#60a5fa;--destructive:#f87171}}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;line-height:1.6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:40px 16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:24px;overflow:hidden}
.card-header{padding:16px 20px 0}.card-body{padding:16px 20px 20px}
h1{font-size:24px;font-weight:700;letter-spacing:-0.02em}h2{font-size:15px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text-muted)}.text-center{text-align:center}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
hr{border:none;border-top:1px solid var(--border);margin:12px 0}

/* Toolbar */
.toolbar{position:sticky;top:0;z-index:100;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 20px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.toolbar-left{display:flex;align-items:center;gap:8px}
.toolbar-right{display:flex;align-items:center;gap:8px}
.draft-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;background:rgba(217,119,6,0.15);color:var(--warning)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{opacity:0.9;background:var(--primary)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{opacity:0.9;background:var(--success)}
.btn-destructive{background:var(--destructive);color:#fff;border-color:var(--destructive)}
.btn-destructive:hover{opacity:0.9;background:var(--destructive)}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* Edit mode styles */
[contenteditable="true"]{outline:2px dashed var(--primary);outline-offset:2px;border-radius:4px;padding:2px 4px;min-height:1.5em}
[contenteditable="true"]:focus{outline-color:var(--info);background:rgba(37,99,235,0.04)}
.remove-btn{display:none;position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:var(--destructive);color:#fff;border:none;cursor:pointer;font-size:12px;line-height:22px;text-align:center}
.edit-mode .remove-btn{display:block}
.edit-mode .mention-row,.edit-mode .theme-card,.edit-mode .comp-item{position:relative}
.edit-mode .mention-row{padding-right:32px}
.edit-mode .theme-card{padding-right:32px}
.status-msg{font-size:12px;padding:4px 10px;border-radius:6px;display:none}
.status-msg.show{display:inline-block}
.status-msg.success{background:rgba(22,163,74,0.1);color:var(--success)}
.status-msg.error{background:rgba(220,38,38,0.1);color:var(--destructive)}

/* Token modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:90vw}
.modal h3{font-size:16px;font-weight:600;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text-muted);margin-bottom:16px}
.modal input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr)}.stat-cell{text-align:center;padding:16px 8px;border-right:1px solid var(--border)}.stat-cell:last-child{border-right:none}
.stat-value{font-size:24px;font-weight:700}.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:4px}

/* Content */
.mention-row{padding:10px 0;border-bottom:1px solid var(--border)}.mention-row:last-child{border-bottom:none}
.mention-title{font-size:14px;font-weight:500;color:var(--primary)}.mention-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.theme-card{border-radius:8px;padding:12px;margin-bottom:10px;border-left:3px solid}
.theme-persistent{background:rgba(217,119,6,0.08);border-left-color:var(--warning)}.theme-emerging{background:rgba(37,99,235,0.08);border-left-color:var(--info)}
.theme-title{font-size:14px;font-weight:600}.theme-desc{font-size:13px;color:var(--text-muted);margin-top:4px}
.theme-relevance{font-size:12px;font-style:italic;margin-top:4px}.theme-links{margin-top:8px}.theme-links a{font-size:12px;display:block;margin-top:3px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 8px;border-radius:99px;vertical-align:middle;margin-left:6px}
.badge-persistent{background:rgba(217,119,6,0.15);color:var(--warning)}.badge-recurring{background:rgba(217,119,6,0.15);color:var(--warning)}.badge-new{background:rgba(37,99,235,0.12);color:var(--info)}
.trend-meta{font-size:11px;color:var(--text-muted);margin-left:6px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}.bar-label{width:200px;font-size:12px;color:var(--text-muted);flex-shrink:0}
.bar-track{flex:1;height:14px;background:var(--border);border-radius:4px;overflow:hidden}.bar-fill{height:100%;background:var(--primary);border-radius:4px}
.bar-count{width:30px;text-align:right;font-size:12px;font-weight:600;flex-shrink:0}
.comp-item{margin-bottom:14px}.comp-name{font-size:14px;font-weight:600}.comp-count{font-size:12px;color:var(--text-muted)}.comp-headline{font-size:13px;margin-top:2px}
.seizure-box{border-radius:8px;padding:14px;background:rgba(22,163,74,0.08);border-left:3px solid var(--success)}
.footer{text-align:center;font-size:11px;color:var(--text-muted);padding:12px 0 40px}
.card-header-row{display:flex;justify-content:space-between;align-items:baseline}.count-label{font-size:12px;color:var(--text-muted)}
</style></head>

</div>

    <div class="card-body" id="mentions-container">`;

      const c = d.competitors[i];
      if (c.count > 0) {
        html += `<div class="comp-item" data-comp-index="${i}">
          <span class="comp-name">${c.name}</span> <span class="comp-count">(${c.count} articles)</span>
          <div class="comp-headline"><a href="${c.top_url || '#'}">${c.top_title || ''}</a> — <span style="color:var(--text-muted);font-size:12px">${c.top_source || ''}</span></div>
        </div><hr>`;
      } else {

  if (d.spotlight_trm || d.spotlight_elliptic) {
    html += `<div class="card"><div class="card-header"><h2>🔎 Competitor Spotlight</h2></div><div class="card-body">`;
    if (d.spotlight_trm) html += `<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px"><strong style="color:var(--text)">TRM Labs:</strong> <span class="editable-inline" data-field="spotlight_trm">${d.spotlight_trm}</span></p>`;
    if (d.spotlight_elliptic) html += `<p style="font-size:14px;color:var(--text-muted)"><strong style="color:var(--text)">Elliptic:</strong> <span class="editable-inline" data-field="spotlight_elliptic">${d.spotlight_elliptic}</span></p>`;
    html += '</div></div>';
  }

  el.innerHTML = html;
  document.getElementById('footer').textContent = `Chainalysis Weekly Briefing · ${d.date_display || d.date} · ${d.articles_analysed || '?'} articles analysed`;
}

// ── Edit mode ─────────────────────────────────────────────────

function toggleEdit() {
  editMode = true;
  document.body.classList.add('edit-mode');
  document.getElementById('editBtn').style.display = 'none';
  document.getElementById('saveBtn').style.display = '';
  document.getElementById('cancelBtn').style.display = '';
  document.getElementById('approveBtn').style.display = 'none';

  document.querySelectorAll('.editable, .editable-inline').forEach(el => {
    el.contentEditable = 'true';
  });
  showStatus('Editing — make your changes, then Save Draft', 'success');
}

function cancelEdit() {
  editMode = false;
  document.body.classList.remove('edit-mode');
  document.getElementById('editBtn').style.display = '';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('approveBtn').style.display = '';

  render(); // re-render from original data
  hideStatus();
}

function readEditsFromDOM() {
  document.querySelectorAll('[data-field][contenteditable="true"]').forEach(el => {
    const field = el.dataset.field;
    const value = el.innerText.trim();
    setNestedField(data, field, value);
  });
}

function setNestedField(obj, path, value) {
  const parts = path.split('.');
  let current = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const key = isNaN(parts[i]) ? parts[i] : parseInt(parts[i]);
    current = current[key];
    if (!current) return;
  }
  const lastKey = isNaN(parts[parts.length-1]) ? parts[parts.length-1] : parseInt(parts[parts.length-1]);
  // Strip emoji prefix from relevance fields
  if (path.endsWith('.relevance')) {
    current[lastKey] = value.replace(/^🏢\s*/, '');
  } else {
    current[lastKey] = value;
  }
}

function removeMention(index) {
  data.mentions.splice(index, 1);
  data.mentions_count = data.mentions.length;
  render();
  toggleEdit(); // stay in edit mode
}

function removeNarrative(index) {
  data.narratives.splice(index, 1);
  data.persistent_count = data.narratives.filter(n => ['persistent','recurring'].includes(n.cadence)).length;
  render();
  toggleEdit();
}

// ── GitHub API ────────────────────────────────────────────────

function getToken() {
  return sessionStorage.getItem('gh_token') || '';
}

function showTokenModal(action) {
  pendingAction = action;
  document.getElementById('tokenModal').classList.add('show');
  document.getElementById('tokenInput').focus();
}

function closeTokenModal() {
  document.getElementById('tokenModal').classList.remove('show');
  pendingAction = null;
}

function saveToken() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  sessionStorage.setItem('gh_token', token);
  document.getElementById('tokenModal').classList.remove('show');
  if (pendingAction === 'save') saveDraft();
  else if (pendingAction === 'approve') approveDraft();
  pendingAction = null;
}

async function ghRequest(method, path, body) {
  const token = getToken();
  const opts = {
    method,
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, opts);
  if (!resp.ok) throw new Error(`GitHub API ${resp.status}: ${await resp.text()}`);
  return resp.json();
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = `status-msg show ${type}`;
}

function hideStatus() {
  document.getElementById('statusMsg').className = 'status-msg';
}

// ── Save draft ────────────────────────────────────────────────

async function saveDraft() {
  if (!getToken()) { showTokenModal('save'); return; }

  readEditsFromDOM();
  showStatus('Saving...', 'success');

  try {
    // Rebuild the HTML with updated data
    const htmlContent = document.documentElement.outerHTML;

    // Actually, we save the JSON data, and rebuild the page from it
    const dataJson = JSON.stringify(data, null, 2);
    const encodedData = btoa(unescape(encodeURIComponent(dataJson)));

    // Get current file SHA
    const draftPath = `drafts/${DATE}.json`;
    let sha = null;
    try {
      const existing = await ghRequest('GET', draftPath);
      sha = existing.sha;
    } catch(e) {}

    const putBody = {
      message: `Update draft ${DATE}`,
      content: encodedData,
      branch: 'main'
    };
    if (sha) putBody.sha = sha;

    await ghRequest('PUT', draftPath, putBody);

    editMode = false;
    document.body.classList.remove('edit-mode');
    document.getElementById('editBtn').style.display = '';
    document.getElementById('saveBtn').style.display = 'none';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('approveBtn').style.display = '';

    render();
    showStatus('✓ Draft saved', 'success');
    setTimeout(hideStatus, 3000);
  } catch(e) {
    showStatus(`Error: ${e.message}`, 'error');
  }
}

// ── Approve & Publish ─────────────────────────────────────────

async function approveDraft() {
  if (!getToken()) { showTokenModal('approve'); return; }
  if (!confirm('Publish this briefing to the archive? This will make it visible on the public site.')) return;

  showStatus('Publishing...', 'success');
  document.getElementById('approveBtn').disabled = true;

  try {
    // 1. Read the draft data
    const draftDataPath = `drafts/${DATE}.json`;
    let draftData;
    try {
      const existing = await ghRequest('GET', draftDataPath);
      draftData = JSON.parse(decodeURIComponent(escape(atob(existing.content.replace(/\n/g, '')))));
    } catch(e) {
      // No saved draft JSON — use in-memory data
      draftData = data;
    }

    // 2. Generate final HTML and push to briefings/
    const finalHtml = buildFinalHtml(draftData);
    const encodedHtml = btoa(unescape(encodeURIComponent(finalHtml)));
    const briefingPath = `briefings/${DATE}.html`;

    let sha = null;
    try { sha = (await ghRequest('GET', briefingPath)).sha; } catch(e) {}

    const putHtml = { message: `Publish briefing ${DATE}`, content: encodedHtml, branch: 'main' };
    if (sha) putHtml.sha = sha;
    await ghRequest('PUT', briefingPath, putHtml);

    // 3. Update archive data JSON
    const archivePath = 'data/weekly-data.json';
    let archiveData = [];
    let archiveSha = null;
    try {
      const existing = await ghRequest('GET', archivePath);
      archiveData = JSON.parse(decodeURIComponent(escape(atob(existing.content.replace(/\n/g, '')))));
      archiveSha = existing.sha;
    } catch(e) {}

    // Build archive entry from data
    const compCounts = {};
    for (const c of (draftData.competitors || [])) compCounts[c.name] = c.count;
    const archiveEntry = {
      date: DATE,
      url: `briefings/${DATE}.html`,
      mentions: draftData.mentions_count,
      narrative: draftData.narrative_count,
      competitor_total: draftData.competitor_total,
      persistent_count: draftData.persistent_count,
      emerging_count: (draftData.narratives || []).filter(n => ['new','sporadic'].includes(n.cadence)).length,
      articles_analysed: draftData.articles_analysed,
      mention_categories: draftData.mention_categories || {},
      sentiment: draftData.sentiment || {},
      competitors: compCounts,
      top_domains: draftData.top_domains || [],
      narratives: (draftData.narratives || []).map(n => n.title),
      headline: (draftData.executive_summary || '').slice(0, 200),
    };

    archiveData = archiveData.filter(e => e.date !== DATE);
    archiveData.push(archiveEntry);
    archiveData.sort((a,b) => b.date.localeCompare(a.date));

    const encodedArchive = btoa(unescape(encodeURIComponent(JSON.stringify(archiveData, null, 2))));
    const putArchive = { message: `Update archive ${DATE}`, content: encodedArchive, branch: 'main' };
    if (archiveSha) putArchive.sha = archiveSha;
    await ghRequest('PUT', archivePath, putArchive);

    // 4. Update UI
    document.querySelector('.draft-badge').textContent = '✅ PUBLISHED';
    document.querySelector('.draft-badge').style.background = 'rgba(22,163,74,0.15)';
    document.querySelector('.draft-badge').style.color = 'var(--success)';
    document.getElementById('approveBtn').style.display = 'none';
    document.getElementById('editBtn').style.display = 'none';

    const owner = REPO.split('/')[0];
    const repoName = REPO.split('/')[1];
    showStatus(`✓ Published → ${owner}.github.io/${repoName}/briefings/${DATE}.html`, 'success');
  } catch(e) {
    showStatus(`Error: ${e.message}`, 'error');
    document.getElementById('approveBtn').disabled = false;
  }
}

function buildFinalHtml(d) {
  // Build clean published HTML (no edit mode, no toolbar, no data JSON)
  const persistent = (d.narratives || []).filter(n => ['persistent','recurring'].includes(n.cadence));
  const emerging = (d.narratives || []).filter(n => ['new','sporadic'].includes(n.cadence));

  let mentionRows = (d.mentions || []).map(m =>
    `<div class="mention-row"><a href="${m.url}" class="mention-title">${m.title}</a><div class="mention-meta">${m.source}</div></div>`
  ).join('');

  let persistentHtml = persistent.map(n => {
    const badge = n.cadence === 'persistent' ? '🔥 Persistent' : '🔁 Recurring';
    const me = {rising:'📈',stable:'➡️',fading:'📉'}[n.momentum] || '';
    const links = (n.articles || []).map(a => `<a href="${a.url}">${a.source}: ${a.title}</a>`).join('');
    const rel = n.relevance ? `<p class="theme-relevance">🏢 ${n.relevance}</p>` : '';
    return `<div class="theme-card theme-persistent"><div><span class="theme-title">${n.title}</span>
      <span class="badge badge-${n.cadence}">${badge}</span>
      <span class="trend-meta">${me} ${n.appearances||1}x</span></div>
      <p class="theme-desc">${n.description}</p>${rel}<div class="theme-links">${links}</div></div>`;
  }).join('');

  let emergingHtml = emerging.map(n => {
    const links = (n.articles || []).map(a => `<a href="${a.url}">${a.source}: ${a.title}</a>`).join('');
    const rel = n.relevance ? `<p class="theme-relevance">🏢 ${n.relevance}</p>` : '';
    return `<div class="theme-card theme-emerging"><span class="theme-title">${n.title}</span>
      <span class="badge badge-new">✨ New</span>
      <p class="theme-desc">${n.description}</p>${rel}<div class="theme-links">${links}</div></div>`;
  }).join('');

  let domainBars = (d.top_domains || []).map((dom, i, arr) => {
    const max = arr[0].count;
    return `<div class="bar-row"><span class="bar-label">${dom.name}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${dom.count/max*100}%"></div></div>
      <span class="bar-count">${dom.count}</span></div>`;
  }).join('');

  let compHtml = (d.competitors || []).map(c => {
    if (c.count > 0) return `<div class="comp-item"><span class="comp-name">${c.name}</span> <span class="comp-count">(${c.count})</span>
      <div class="comp-headline"><a href="${c.top_url||'#'}">${c.top_title||''}</a> — <span style="color:var(--text-muted);font-size:12px">${c.top_source||''}</span></div></div><hr>`;
    return `<div class="comp-item"><span class="comp-name" style="color:var(--text-muted)">${c.name}</span> <span class="comp-count">(0)</span></div><hr>`;
  }).join('');

  let landscapeHtml = d.market_landscape ? `<div class="card"><div class="card-header"><h2>🌍 Market Landscape</h2></div><div class="card-body"><p style="font-size:14px;color:var(--text-muted);line-height:1.7">${d.market_landscape}</p></div></div>` : '';
  let spotlightHtml = '';
  if (d.spotlight_trm || d.spotlight_elliptic) {
    spotlightHtml = '<div class="card"><div class="card-header"><h2>🔎 Competitor Spotlight</h2></div><div class="card-body">';
    if (d.spotlight_trm) spotlightHtml += `<p style="font-size:14px;color:var(--text-muted);margin-bottom:12px"><strong style="color:var(--text)">TRM Labs:</strong> ${d.spotlight_trm}</p>`;
    if (d.spotlight_elliptic) spotlightHtml += `<p style="font-size:14px;color:var(--text-muted)"><strong style="color:var(--text)">Elliptic:</strong> ${d.spotlight_elliptic}</p>`;
    spotlightHtml += '</div></div>';
  }

  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Weekly Briefing — ${DATE}</title>
<style>
:root{--bg:#f8f9fa;--card:#fff;--text:#1a1a2e;--text-muted:#6b7280;--border:#e5e7eb;--primary:#1a73e8;--success:#16a34a;--warning:#d97706;--info:#2563eb}
@media(prefers-color-scheme:dark){:root{--bg:#111118;--card:#1c1c27;--text:#e4e4e7;--text-muted:#9ca3af;--border:#2e2e3a;--primary:#60a5fa;--success:#4ade80;--warning:#fbbf24;--info:#60a5fa}}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;line-height:1.6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:40px 16px}.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:24px;overflow:hidden}
.card-header{padding:16px 20px 0}.card-body{padding:16px 20px 20px}h1{font-size:24px;font-weight:700}h2{font-size:15px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text-muted)}.text-center{text-align:center}a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:20px;border-bottom:1px solid var(--border);font-size:13px}.nav-bar a{color:var(--primary)}.nav-bar .disabled{color:var(--text-muted)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr)}.stat-cell{text-align:center;padding:16px 8px;border-right:1px solid var(--border)}.stat-cell:last-child{border-right:none}
.stat-value{font-size:24px;font-weight:700}.stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-top:4px}
.mention-row{padding:10px 0;border-bottom:1px solid var(--border)}.mention-row:last-child{border-bottom:none}.mention-title{font-size:14px;font-weight:500;color:var(--primary)}.mention-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.theme-card{border-radius:8px;padding:12px;margin-bottom:10px;border-left:3px solid}.theme-persistent{background:rgba(217,119,6,0.08);border-left-color:var(--warning)}.theme-emerging{background:rgba(37,99,235,0.08);border-left-color:var(--info)}
.theme-title{font-size:14px;font-weight:600}.theme-desc{font-size:13px;color:var(--text-muted);margin-top:4px}.theme-relevance{font-size:12px;font-style:italic;margin-top:4px}.theme-links{margin-top:8px}.theme-links a{font-size:12px;display:block;margin-top:3px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 8px;border-radius:99px;margin-left:6px}.badge-persistent,.badge-recurring{background:rgba(217,119,6,0.15);color:var(--warning)}.badge-new{background:rgba(37,99,235,0.12);color:var(--info)}.trend-meta{font-size:11px;color:var(--text-muted);margin-left:6px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}.bar-label{width:200px;font-size:12px;color:var(--text-muted)}.bar-track{flex:1;height:14px;background:var(--border);border-radius:4px;overflow:hidden}.bar-fill{height:100%;background:var(--primary);border-radius:4px}.bar-count{width:30px;text-align:right;font-size:12px;font-weight:600}
.comp-item{margin-bottom:14px}.comp-name{font-size:14px;font-weight:600}.comp-count{font-size:12px;color:var(--text-muted)}.comp-headline{font-size:13px;margin-top:2px}
.seizure-box{border-radius:8px;padding:14px;background:rgba(22,163,74,0.08);border-left:3px solid var(--success)}.footer{text-align:center;font-size:11px;color:var(--text-muted);padding:12px 0 40px}
.card-header-row{display:flex;justify-content:space-between;align-items:baseline}.count-label{font-size:12px;color:var(--text-muted)}
</style></head><body><div class="container">
<div class="nav-bar"><span class="disabled">← Previous week</span><a href="../index.html">📋 Archive</a><span class="disabled">Next week →</span></div>
<div class="text-center" style="margin-bottom:28px"><h1>Weekly Briefing</h1><p class="subtitle">Week ending ${d.date_display || DATE}</p></div>
<div class="card"><div class="stat-grid">
<div class="stat-cell"><div class="stat-value" style="color:var(--primary)">${d.mentions_count}</div><div class="stat-label">Our Mentions</div></div>
<div class="stat-cell"><div class="stat-value" style="color:var(--success)">${d.narrative_count}</div><div class="stat-label">Narrative</div></div>
<div class="stat-cell"><div class="stat-value" style="color:var(--warning)">${d.competitor_total}</div><div class="stat-label">Competitor</div></div>
<div class="stat-cell"><div class="stat-value" style="color:var(--info)">${persistent.length}</div><div class="stat-label">Persistent</div></div>
</div></div>
<div class="card"><div class="card-header"><h2>Strategic Summary</h2></div><div class="card-body"><p style="font-size:14px;color:var(--text-muted)">${d.executive_summary}</p></div></div>
<div class="card"><div class="card-header"><div class="card-header-row"><h2>📰 Chainalysis in the News</h2><span class="count-label">${d.mentions_count} mentions</span></div></div><div class="card-body">${mentionRows}</div></div>
${persistentHtml ? `<div class="card"><div class="card-header"><h2>🔥 Persistent Themes</h2></div><div class="card-body">${persistentHtml}</div></div>` : ''}
${emergingHtml ? `<div class="card"><div class="card-header"><h2>✨ Emerging This Week</h2></div><div class="card-body">${emergingHtml}</div></div>` : ''}
${domainBars ? `<div class="card"><div class="card-header"><h2>📊 Topic Coverage</h2></div><div class="card-body">${domainBars}</div></div>` : ''}
${compHtml ? `<div class="card"><div class="card-header"><h2>🏢 Competitor Watch</h2></div><div class="card-body">${compHtml}</div></div>` : ''}
${landscapeHtml}${spotlightHtml}
<div class="footer">Chainalysis Weekly Briefing · ${d.date_display || DATE} · ${d.articles_analysed || '?'} articles analysed</div>
</div></body></html>`;
}

init();
</script>
</body></html>
