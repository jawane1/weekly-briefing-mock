<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Briefing Archive</title>
    <style>
      :root {
        --bg: #f8f9fa;
        --card: #ffffff;
        --text: #1a1a2e;
        --text-muted: #6b7280;
        --border: #e5e7eb;
        --primary: #1a73e8;
        --success: #16a34a;
        --warning: #d97706;
        --info: #2563eb;
        --chart-us: #1a73e8;
        --chart-comp: #f57c00;
        --chart-mainstream: #1a73e8;
        --chart-crypto: #7c3aed;
        --chart-fintech: #0891b2;
        --chart-blog: #d97706;
        --chart-niche: #9ca3af;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111118;
          --card: #1c1c27;
          --text: #e4e4e7;
          --text-muted: #9ca3af;
          --border: #2e2e3a;
          --primary: #60a5fa;
          --success: #4ade80;
          --warning: #fbbf24;
          --info: #60a5fa;
          --chart-us: #60a5fa;
          --chart-comp: #fbbf24;
          --chart-mainstream: #60a5fa;
          --chart-crypto: #a78bfa;
          --chart-fintech: #22d3ee;
          --chart-blog: #fbbf24;
          --chart-niche: #6b7280;
        }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
      }
      .container { max-width: 900px; margin: 0 auto; padding: 40px 16px; }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 20px;
        overflow: hidden;
      }
      .card-header { padding: 16px 20px 0; }
      .card-body { padding: 16px 20px 20px; }
      h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
      h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
      h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
      .subtitle { font-size: 13px; color: var(--text-muted); }
      .text-center { text-align: center; }
      a { color: var(--primary); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 8px; }
      @media (max-width: 640px) { .dash-grid { grid-template-columns: 1fr; } }

      /* Stacked bars */
      .spark-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
      .spark-label { width: 80px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; text-align: right; }
      .spark-bar { flex: 1; height: 20px; border-radius: 4px; overflow: hidden; display: flex; }
      .spark-segment { height: 100%; }
      .spark-value { width: 24px; text-align: right; font-size: 11px; font-weight: 600; flex-shrink: 0; }
      .chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
      .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
      .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

      /* Share of voice */
      .sov-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
      .sov-name { width: 130px; font-size: 12px; flex-shrink: 0; }
      .sov-name.us { font-weight: 600; color: var(--primary); }
      .sov-track { flex: 1; height: 18px; background: var(--border); border-radius: 4px; overflow: hidden; }
      .sov-fill { height: 100%; border-radius: 4px; }
      .sov-fill.us { background: var(--chart-us); }
      .sov-fill.comp { background: var(--chart-comp); opacity: 0.7; }
      .sov-count { width: 28px; text-align: right; font-size: 12px; font-weight: 600; flex-shrink: 0; }

      /* Briefing cards */
      .briefing-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 14px;
        transition: border-color 0.2s;
        cursor: pointer;
        text-decoration: none;
        display: block;
        color: var(--text);
      }
      .briefing-card:hover { border-color: var(--primary); text-decoration: none; }
      .briefing-card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; gap: 8px; }
      .briefing-date { font-size: 15px; font-weight: 600; }
      .briefing-stats { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); }
      .briefing-stat strong { color: var(--text); font-weight: 600; }
      .briefing-headline { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
      .briefing-narratives { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
      .narrative-tag {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 99px;
        background: rgba(37, 99, 235, 0.08);
        color: var(--info);
        white-space: nowrap;
      }

      .footer { text-align: center; font-size: 11px; color: var(--text-muted); padding: 20px 0 40px; }
    </style>
  </head>
  <body>
    <div class="container">

      <div class="text-center" style="margin-bottom: 32px;">
        <h1>📋 Weekly Briefing Archive</h1>
        <p class="subtitle" style="margin-top: 4px;">Chainalysis media intelligence — trend tracking across weekly briefings.</p>
      </div>

      <div id="dashboard"></div>
      <div id="briefing-list"></div>

      <div class="footer">Chainalysis Weekly Briefing Archive</div>
    </div>

    <script>
      async function init() {
        let data;
        try {
          const resp = await fetch('data/weekly-data.json');
          data = await resp.json();
        } catch (e) {
          document.getElementById('briefing-list').innerHTML =
            '<p style="text-align:center;color:var(--text-muted);padding:40px;">Could not load briefing data.</p>';
          return;
        }
        data.sort((a, b) => b.date.localeCompare(a.date));
        renderDashboard(data);
        renderBriefingList(data);
      }

      function fmtDate(d) {
        return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }
      function shortDate(d) {
        return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }

      function renderDashboard(data) {
        const el = document.getElementById('dashboard');
        if (!data.length) return;
        const chrono = [...data].reverse();
        const latest = data[0];

        let html = '<div class="dash-grid">';

        // ── 1. Share of Voice ──────────────────────────
        html += `<div class="card">
          <div class="card-header"><h3>📊 Share of Voice</h3></div>
          <div class="card-body">${renderShareOfVoice(latest)}</div>
        </div>`;

        // ── 2. Source Quality Mix ──────────────────────
        html += `<div class="card">
          <div class="card-header"><h3>📡 Source Quality</h3></div>
          <div class="card-body">${renderSourceBars(chrono)}</div>
        </div>`;

        html += '</div>';

        // ── 3. Mention Trend (full width, only if 2+ weeks) ───
        if (data.length >= 2) {
          html += `<div class="card">
            <div class="card-header"><h3>📈 Mention Trend</h3></div>
            <div class="card-body">${renderMentionTrend(chrono)}</div>
          </div>`;
        }

        el.innerHTML = html;
      }

      function renderShareOfVoice(latest) {
        const comps = latest.competitors || {};
        const entries = [
          { name: 'Chainalysis', count: latest.mentions, isUs: true },
          ...Object.entries(comps)
            .filter(([_, c]) => c > 0)
            .sort((a, b) => b[1] - a[1])
            .map(([name, count]) => ({ name, count, isUs: false }))
        ];
        const max = Math.max(...entries.map(e => e.count), 1);

        let html = '';
        for (const e of entries) {
          html += `<div class="sov-row">
            <span class="sov-name ${e.isUs ? 'us' : ''}">${e.isUs ? '● ' : ''}${e.name}</span>
            <div class="sov-track">
              <div class="sov-fill ${e.isUs ? 'us' : 'comp'}" style="width:${e.count/max*100}%"></div>
            </div>
            <span class="sov-count">${e.count}</span>
          </div>`;
        }
        return html;
      }

      function renderSourceBars(data) {
        const cats = ['mainstream', 'crypto', 'fintech', 'blog', 'niche'];
        const colors = {
          mainstream: 'var(--chart-mainstream)',
          crypto: 'var(--chart-crypto)',
          fintech: 'var(--chart-fintech)',
          blog: 'var(--chart-blog)',
          niche: 'var(--chart-niche)'
        };

        let html = '';
        for (const week of data) {
          const mc = week.mention_categories || {};
          const total = Object.values(mc).reduce((s, v) => s + v, 0) || 1;
          html += `<div class="spark-row">
            <span class="spark-label">${shortDate(week.date)}</span>
            <div class="spark-bar">`;
          for (const cat of cats) {
            const pct = (mc[cat] || 0) / total * 100;
            if (pct > 0) {
              html += `<div class="spark-segment" style="width:${pct}%;background:${colors[cat]}" title="${cat}: ${mc[cat] || 0}"></div>`;
            }
          }
          html += `</div><span class="spark-value">${total}</span></div>`;
        }
        html += '<div class="chart-legend">';
        for (const cat of cats) {
          html += `<span class="legend-item"><span class="legend-dot" style="background:${colors[cat]}"></span>${cat}</span>`;
        }
        html += '</div>';
        return html;
      }

      function renderMentionTrend(data) {
        const max = Math.max(...data.map(d => d.mentions), 1);
        const h = 100, pad = 15;
        const w = 300;
        const step = (w - pad * 2) / (data.length - 1);

        let svg = `<svg viewBox="0 0 ${w} ${h + 20}" style="width:100%;height:${h + 20}px;">`;
        // Grid
        for (let i = 0; i <= 3; i++) {
          const y = pad + (h - pad * 2) / 3 * i;
          svg += `<line x1="${pad}" y1="${y}" x2="${w - pad}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
        }
        // Line + dots
        const pts = data.map((d, i) => {
          const x = pad + i * step;
          const y = pad + (h - pad * 2) - (d.mentions / max * (h - pad * 2));
          return { x, y, mentions: d.mentions, date: d.date };
        });
        svg += `<polyline points="${pts.map(p => `${p.x},${p.y}`).join(' ')}" fill="none" stroke="var(--chart-us)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
        for (const p of pts) {
          svg += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--chart-us)"/>`;
          svg += `<text x="${p.x}" y="${p.y - 8}" text-anchor="middle" font-size="10" font-weight="600" fill="var(--text)">${p.mentions}</text>`;
          svg += `<text x="${p.x}" y="${h + 12}" text-anchor="middle" font-size="9" fill="var(--text-muted)">${shortDate(p.date)}</text>`;
        }
        svg += '</svg>';
        return svg;
      }

      function renderBriefingList(data) {
        const el = document.getElementById('briefing-list');
        if (!data.length) {
          el.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">No briefings yet.</p>';
          return;
        }

        let html = '<h2 style="margin-top:8px;">All Briefings</h2>';
        for (const week of data) {
          const tags = (week.narratives || []).slice(0, 3).map(n =>
            `<span class="narrative-tag">${n.length > 40 ? n.slice(0, 40) + '…' : n}</span>`
          ).join('');

          html += `<a href="${week.url}" class="briefing-card">
            <div class="briefing-card-header">
              <span class="briefing-date">Week of ${fmtDate(week.date)}</span>
              <div class="briefing-stats">
                <span class="briefing-stat"><strong style="color:var(--primary)">${week.mentions}</strong> mentions</span>
                <span class="briefing-stat"><strong style="color:var(--warning)">${week.competitor_total}</strong> competitor</span>
                <span class="briefing-stat">${week.articles_analysed.toLocaleString()} analysed</span>
              </div>
            </div>
            <div class="briefing-headline">${week.headline || ''}</div>
            ${tags ? `<div class="briefing-narratives">${tags}</div>` : ''}
          </a>`;
        }
        el.innerHTML = html;
      }

      init();
    </script>
  </body>
</html>
